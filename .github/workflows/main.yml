name: Sail Intraday Analysis

on:
  schedule:
    # Run every 30 minutes during market hours (9:30 AM - 4:00 PM EST, Monday-Friday)
    - cron: '*/30 9-16 * * 1-5'
  workflow_dispatch:  # Allow manual trigger

jobs:
  intraday-analysis:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas
      
      - name: Download intraday data
        run: |
          python scripts/download_intraday.py
        continue-on-error: true
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit"
          else
            git commit -m "chore: update intraday data - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
        continue-on-error: true
